# Configuraci?n del servidor
server.port=8080

# Configuraci?n de JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/aniverse?useSSL=false&serverTimezone=UTC
spring.datasource.username=rodri
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Configuraci?n de JWT
jwt.secretKey=EstaEsUnaClaveSeguraParaFirmarTokensJWT
jwt.expiration=3600000
jwt.refreshExpiration=3600000

# Configuraci?n para la carga de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.cache.type=caffeine
spring.cache.cache-names=animeCache,animeListCache,topRatedCache
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=15m


# Configuraci?n para notificaciones
notificacion.duracion.dias=30

# Configuraci?n para actividades
actividad.duracion.dias=60

# Configuraci?n API externa
jikan.api.url=https://api.jikan.moe/v4
jikan.api.timeout=10000

# Configuraci?n WebSocket
server.servlet.session.timeout=30m
spring.session.store-type=none

# Logging para WebSocket
logging.level.org.springframework.messaging=DEBUG
logging.level.org.springframework.web.socket=DEBUG

# Rate Limiting configuration
rate.limit.requests-per-second=100
rate.limit.burst=20

# Configuraci?n para Async
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# Configuraci?n de recomendaciones
recommendation.cache.duration.minutes=30
recommendation.similarity.threshold=0.2